server.port=${PORT:8086}

# WebSocket Service URL
websocket.service.url=${WEBSOCKET_SERVICE_URL:http://websocket-service:8085}

# Hugging Face API
huggingface.api.token=${HUGGINGFACE_TOKEN:}

# Gemini API (not used, but needed for bean initialization)
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent}

# AI enabled flag
ai.enabled=${AI_ENABLED:true}
