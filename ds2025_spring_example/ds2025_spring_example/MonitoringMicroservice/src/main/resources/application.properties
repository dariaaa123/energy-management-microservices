# Server Configuration
server.port=${PORT:8084}

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_IP:localhost}:${DB_PORT:5432}/${DB_DBNAME:monitoring-db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# RabbitMQ Configuration
spring.rabbitmq.addresses=${RABBITMQ_URL:amqps://jjzdoqha:Albina_16@cow.rmq2.cloudamqp.com/jjzdoqha}
spring.rabbitmq.connection-timeout=10000

# Queue Names
rabbitmq.queue.device-data=device_data_queue
rabbitmq.queue.sync=monitoring_sync_queue
rabbitmq.exchange.data=data_exchange
rabbitmq.exchange.sync=sync_exchange
rabbitmq.routing-key.device-data=device.data.key
rabbitmq.routing-key.sync=sync.key

# Notification Configuration
rabbitmq.exchange.notification=notification_exchange
rabbitmq.routing.notification=notification.key

# Logging
logging.level.com.energy=DEBUG
logging.level.org.springframework.amqp=DEBUG
